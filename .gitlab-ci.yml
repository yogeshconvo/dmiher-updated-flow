stages: [build, deploy]

# Runs the SSR pipeline (client + server bundles). The static site at
# dmiher.edu.in/dmiher-web/ is currently served from dist/client/ (Apache +
# spa.php nonce stamping), so only that half is FTP-deployed below. Building
# the server bundle here as well exercises the SSR entry (src/entry-server.jsx)
# on every push so we catch SSR-only regressions early — even before the Node
# host is provisioned. dist/server/ is kept as a build artifact for a future
# Node runtime deployment.
build:
  stage: build
  image: node:20-alpine
  cache:
    key:
      files: [package-lock.json]
    paths: [node_modules/]
  script:
    - npm ci --legacy-peer-deps
    - npm run build:ssr
  artifacts:
    paths: [dist/]
    expire_in: 1 day
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# Mirrors dist/client/ (index.html, spa.php, .htaccess, assets/, etc.) into
# the FTP webroot at $FTP_PATH — deliberately NOT dist/ itself, or the
# client/ and server/ subdirs would land under the webroot and break the
# current URL layout. dist/server/ stays in the artifact for follow-on Node
# deployment work but is not shipped to the FTP host that runs Apache+PHP.
deploy:
  stage: deploy
  image: alpine:latest
  needs: [build]
  before_script:
    - apk add --no-cache lftp
  script:
    - |
      lftp -c "
        set ftp:ssl-allow no;
        set ssl:verify-certificate no;
        open -u $FTP_USER,$FTP_PASS $FTP_HOST;
        mirror -R --only-newer --parallel=4 \
          --exclude-glob=.ftp-deploy-sync-state.json \
          --exclude-glob=*.zip \
          --exclude-glob=*OLDFILE* \
          --exclude-glob=asOLDFILE \
          dist/client/ $FTP_PATH
      "
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
