stages: [build, deploy]

# Rolled back to the plain SSR client build. The earlier SSG (Puppeteer
# prerender) path was writing the fully-rendered home content into
# dist/client/index.html, but Apache/spa.php serves that same file for EVERY
# route (React Router picks the component client-side). So visiting /jnmc,
# /spdc, etc. was booting the SPA on top of a DOM that had home-page markup
# baked in — React hit hydration mismatch (#418) and page-loads timed out.
# Fix: ship the empty Vite shell for every route again, let the SPA render
# fresh on the client. Revisit SSG later by keeping a separate shell.html
# for non-prerendered routes and making spa.php pick the right file per URL.
build:
  stage: build
  image: node:20-alpine
  cache:
    key:
      files: [package-lock.json]
    paths: [node_modules/]
  script:
    - npm ci --legacy-peer-deps
    - npm run build:ssr
  artifacts:
    paths: [dist/]
    expire_in: 1 day
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# Mirrors dist/client/ (index.html, spa.php, .htaccess, assets/, etc.) into
# the FTP webroot at $FTP_PATH — deliberately NOT dist/ itself, or the
# client/ and server/ subdirs would land under the webroot and break the
# current URL layout. dist/server/ stays in the artifact for follow-on Node
# deployment work but is not shipped to the FTP host that runs Apache+PHP.
deploy:
  stage: deploy
  image: alpine:latest
  needs: [build]
  before_script:
    - apk add --no-cache lftp
  script:
    - |
      lftp -c "
        set ftp:ssl-allow no;
        set ssl:verify-certificate no;
        open -u $FTP_USER,$FTP_PASS $FTP_HOST;
        mirror -R --only-newer --parallel=4 \
          --exclude-glob=.ftp-deploy-sync-state.json \
          --exclude-glob=*.zip \
          --exclude-glob=*OLDFILE* \
          --exclude-glob=asOLDFILE \
          dist/client/ $FTP_PATH
      "
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
