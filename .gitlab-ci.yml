stages: [build, deploy]

# SSG pipeline. build:ssg runs `vite build --outDir dist/client` and then
# scripts/prerender.mjs, which drives a headless Chromium against each entry
# in src/prerender-routes.js and writes fully-rendered HTML to
# dist/client/<route>/index.html. Apache + spa.php serves those files with
# a fresh per-request CSP nonce, so search crawlers see full content on the
# first byte without needing a Node runtime on the host.
#
# node:20-slim (not alpine) is used because puppeteer's default download
# path is glibc-based, and shipping alpine chromium + puppeteer-core takes
# more moving parts than swapping the base image once.
build:
  stage: build
  image: node:20-slim
  variables:
    # Reuse the system chromium apt installs below instead of pulling
    # puppeteer's bundled ~150 MB build every CI run.
    PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"
    PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium
  cache:
    key:
      files: [package-lock.json]
    paths: [node_modules/]
  before_script:
    # Chromium + the shared libs headless Chrome needs at runtime. Kept in
    # sync with Puppeteer's Debian install guide — dropping any of these will
    # produce a "libnss3.so: cannot open shared object" style failure at
    # browser launch.
    - apt-get update
    - apt-get install -y --no-install-recommends
        chromium
        fonts-liberation
        libnss3
        libatk-bridge2.0-0
        libcups2
        libdrm2
        libgbm1
        libxkbcommon0
        libxcomposite1
        libxrandr2
        libxfixes3
        libxdamage1
        libasound2
        libpango-1.0-0
        libcairo2
        ca-certificates
    - rm -rf /var/lib/apt/lists/*
  script:
    - npm ci --legacy-peer-deps
    - npm run build:ssg
  artifacts:
    paths: [dist/]
    expire_in: 1 day
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# Mirrors dist/client/ (index.html, spa.php, .htaccess, assets/, and the
# per-route <slug>/index.html files the prerender pass generated) into the
# FTP webroot. Deliberately NOT dist/ itself, or the client/ subdir would
# land under the webroot and break the current URL layout.
deploy:
  stage: deploy
  image: alpine:latest
  needs: [build]
  before_script:
    - apk add --no-cache lftp
  script:
    - |
      lftp -c "
        set ftp:ssl-allow no;
        set ssl:verify-certificate no;
        open -u $FTP_USER,$FTP_PASS $FTP_HOST;
        mirror -R --only-newer --parallel=4 \
          --exclude-glob=.ftp-deploy-sync-state.json \
          --exclude-glob=*.zip \
          --exclude-glob=*OLDFILE* \
          --exclude-glob=asOLDFILE \
          dist/client/ $FTP_PATH
      "
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
