stages: [build, deploy]

# SSG pipeline: `vite build --outDir dist/client` produces the SPA bundle,
# then scripts/prerender.mjs starts vite preview and drives a headless
# Chromium against every route in src/prerender-routes.js, writing fully
# rendered HTML back to dist/client/<route>/index.html so crawlers see real
# content on the first byte.
#
# The prerender.mjs script has a "no <main>" safety guard — if any route
# comes back without real content (auth failure, upstream 5xx, etc.), it
# leaves the Vite-built shell in place instead of overwriting it, so a
# partial upstream failure can't take the site down. Currently
# prerender-routes.js only contains "/" — expand it once the pipeline runs
# green end to end.
build:
  stage: build
  # node:20-slim (not alpine) — apt-get install for the chromium runtime deps
  # is far more reliable on Debian than fighting alpine's musl/glibc mismatch
  # with Puppeteer's bundled Chromium.
  image: node:20-slim
  variables:
    # Skip Puppeteer's ~150 MB bundled Chromium download; we install a system
    # chromium below and point Puppeteer at it via PUPPETEER_EXECUTABLE_PATH.
    PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"
    PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium
  cache:
    key:
      files: [package-lock.json]
    paths: [node_modules/]
  before_script:
    # Chromium + the shared libs headless Chrome needs at runtime. Dropping
    # any of these produces a "libnss3.so: cannot open shared object" style
    # failure at browser launch.
    - apt-get update
    - apt-get install -y --no-install-recommends
        chromium
        fonts-liberation
        libnss3
        libatk-bridge2.0-0
        libcups2
        libdrm2
        libgbm1
        libxkbcommon0
        libxcomposite1
        libxrandr2
        libxfixes3
        libxdamage1
        libasound2
        libpango-1.0-0
        libcairo2
        ca-certificates
    - rm -rf /var/lib/apt/lists/*
  script:
    - npm ci --legacy-peer-deps
    - npm run build:ssg
  artifacts:
    paths: [dist/]
    expire_in: 1 day
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# Mirrors dist/client/ (index.html, spa.php, .htaccess, assets/, etc.) into
# the FTP webroot at $FTP_PATH — deliberately NOT dist/ itself, or the
# client/ and server/ subdirs would land under the webroot and break the
# current URL layout. dist/server/ stays in the artifact for follow-on Node
# deployment work but is not shipped to the FTP host that runs Apache+PHP.
deploy:
  stage: deploy
  image: alpine:latest
  needs: [build]
  before_script:
    - apk add --no-cache lftp
  script:
    - |
      lftp -c "
        set ftp:ssl-allow no;
        set ssl:verify-certificate no;
        open -u $FTP_USER,$FTP_PASS $FTP_HOST;
        mirror -R --only-newer --parallel=4 \
          --exclude-glob=.ftp-deploy-sync-state.json \
          --exclude-glob=*.zip \
          --exclude-glob=*OLDFILE* \
          --exclude-glob=asOLDFILE \
          dist/client/ $FTP_PATH
      "
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
