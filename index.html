<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Force light-mode rendering — see :root { color-scheme: light } in src/index.css.
       Browsers honour this meta before the CSS loads, preventing a brief
       dark flash for users on OS-level dark mode. -->
  <meta name="color-scheme" content="light only" />
  <link href="/src/index.css" rel="stylesheet">

  <!-- Security Headers (CSP enforced via HTTP header in production by Laravel middleware) -->
  <meta http-equiv="X-Content-Type-Options" content="nosniff" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />

  <!-- Per-request CSP nonce. In production the Laravel FrontendController
       replaces __CSP_NONCE__ with the same nonce it sets in the CSP header
       on this HTML response. In Vite dev the placeholder is left as-is and
       the cspNonce helper treats it as absent. -->
  <meta name="csp-nonce" content="__CSP_NONCE__" />

  <!-- Default SEO meta (overridden by react-helmet-async per page) -->
  <title>DMIHER | Datta Meghe Institute of Higher Education and Research</title>
  <meta name="description" content="Official website of Datta Meghe Institute of Higher Education and Research (DMIHER) — Medical, Dental, Nursing, and Allied Health Sciences." />
  <meta name="robots" content="index, follow" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="DMIHER" />
  <!--app-head-->
</head>

<body>
  <div id="root"><!--app-html--></div>
  <!--app-state-->
  <script type="module" nonce="__CSP_NONCE__" src="/src/entry-client.jsx"></script>
</body>

</html>
